<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#d32f2f">
  <title>SG Bus Arrival</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Loading / Error overlay -->
  <div id="loading-overlay">
    <div id="loading-inner">
      <div class="spinner"></div>
      <p id="loading-text">Loading bus stops…</p>
      <a id="loading-link" href="https://datamall.lta.gov.sg/content/datamall/en/request-for-api.html" target="_blank" class="hidden">Get a free API key →</a>
    </div>
  </div>

  <!-- Search bar -->
  <div id="search-bar">
    <div id="search-box">
      <svg class="icon-search" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        id="search-input"
        type="text"
        inputmode="search"
        placeholder="Search stop code or name…"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      >
      <button id="clear-btn" class="hidden" aria-label="Clear search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="search-results" class="hidden"></div>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Zoom hint -->
  <div id="zoom-hint" class="hidden">Zoom in to see bus stops</div>

  <!-- Clear route button (appears when a route is shown) -->
  <button id="clear-route-btn" class="hidden">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
    <span id="clear-route-label">Clear route</span>
  </button>

  <!-- Locate me button -->
  <button id="locate-btn" aria-label="Go to my location">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      <circle cx="12" cy="12" r="9" stroke-dasharray="2 4"/>
    </svg>
  </button>

  <!-- Nearby stops sheet (always-visible peek, drag up to expand) -->
  <div id="nearby-sheet">
    <div id="nearby-handle">
      <div class="handle-bar"></div>
      <div class="nearby-title">
        <span>📍 Nearby Stops</span>
        <svg class="chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
          <polyline points="18 15 12 9 6 15"/>
        </svg>
      </div>
    </div>
    <div id="nearby-list"></div>
  </div>

  <!-- Bottom sheet -->
  <div id="bottom-sheet">
    <div id="drag-handle"></div>

    <div id="sheet-header">
      <button id="back-btn" class="hidden" aria-label="Back to nearby stops">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div id="stop-details">
        <div id="stop-top">
          <span id="stop-code-badge"></span>
          <span id="stop-name"></span>
        </div>
        <div id="stop-road"></div>
      </div>
      <button id="close-btn" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div id="meta-bar">
      <span id="updated-label">—</span>
      <button id="refresh-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        Refresh
      </button>
    </div>

    <div id="legend-bar">
      <span class="legend-item"><span class="legend-dot sea"></span>Seats avail.</span>
      <span class="legend-item"><span class="legend-dot sda"></span>Standing avail.</span>
      <span class="legend-item"><span class="legend-dot lsd"></span>Ltd. standing</span>
    </div>

    <div id="services-list"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="/js/app.js"></script>
</body>
</html>
